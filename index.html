<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
</head>
<body>

<h2>Formulario de Registro</h2>

<form>
    <table border="1" cellpadding="10">

        <tr>
            <td>Nombres:</td>
            <td><input type="text" name="nombres" required></td>
        </tr>

        <tr>
            <td>Número de cédula:</td>
            <td><input type="text" name="cedula" pattern="[0-9]{10}" inputmode="numeric" required 
        title="Ingrese solo números (10 dígitos)"></td>
        </tr>

        <tr>
            <td>Fecha de nacimiento:</td>
            <td><input type="date" name="fecha"></td>
        </tr>

        <tr>
            <td>Ciudad:</td>
            <td><input type="text" name="ciudad"></td>
        </tr>

        <tr>
            <td>Correo:</td>
            <td><input type="email" name="correo"></td>
        </tr>

        <tr>
            <td>Teléfono:</td>
            <td><input type="tel" name="telefono"></td>
        </tr>

        <tr>
            <td>Dirección:</td>
            <td><textarea name="direccion" rows="4" cols="30"></textarea></td>
        </tr>

        <tr>
            <td>Estado civil:</td>
            <td>
                <select name="estado_civil">
                    <option>Soltero/a</option>
                    <option>Casado/a</option>
                    <option>Divorciado/a</option>
                    <option>Viudo/a</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Etnia:</td>
            <td>
                <select name="etnia">
                    <option>Mestizo</option>
                    <option>Indígena</option>
                    <option>Afroecuatoriano</option>
                    <option>Montubio</option>
                    <option>Blanco</option>
                </select>
            </td>
        </tr>

        <tr>
            <td>Género:</td>
            <td>
                <input type="radio" name="genero" value="masculino"> Masculino
                <input type="radio" name="genero" value="femenino"> Femenino
            </td>
        </tr>

        <tr>
            <td>Gustos personales:</td>
            <td>
                <input type="checkbox" name="gustos" value="deportes"> Deportes
                <input type="checkbox" name="gustos" value="musica"> Música
                <input type="checkbox" name="gustos" value="lectura"> Lectura
                <input type="checkbox" name="gustos" value="tecnologia"> Tecnologías
                <input type="checkbox" name="gustos" value="otros"> Otros
            </td>
        </tr>

        <tr>
            <td colspan="2" align="center">
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpiar">
            </td>
        </tr>

    </table>
</form>

</body>
</html>
